#ddev-silent-no-warn
# Coder-specific DDEV hooks (auto-generated by ddev coder-setup, do not edit)
#
# Coder environment variables injected into the DDEV web container so that
# tools running inside it (e.g. Vite/Astro dev servers) can construct correct
# URLs and detect the Coder environment:
#   CODER                      - set to "true"; use to detect a Coder workspace
#   CODER_AGENT_URL            - Coder server base URL (e.g. https://coder.ddev.com/)
#   CODER_WORKSPACE_AGENT_NAME - agent name used in Coder subdomain URLs (e.g. main)
#   CODER_WORKSPACE_NAME       - workspace name; used in subdomain URL construction (e.g. remotework)
#   CODER_WORKSPACE_OWNER_NAME - workspace owner; used in subdomain URL construction (e.g. rfay)
#   VSCODE_PROXY_URI           - proxy URL template for port forwarding
#                                (e.g. https://{{port}}--main--remotework--rfay.coder.ddev.com}--agent--workspace--owner.domain})
#                                used to derive the allowed host domain for dev servers
web_environment:
  - CODER=true
  - CODER_AGENT_URL=https://coder.ddev.com/
  - CODER_WORKSPACE_AGENT_NAME=main
  - CODER_WORKSPACE_NAME=remotework
  - CODER_WORKSPACE_OWNER_NAME=rfay
  - VSCODE_PROXY_URI=https://{{port}}--main--remotework--rfay.coder.ddev.com
hooks:
  post-start:
    - exec-host: ddev coder-routes
  post-stop:
    - exec-host: rm -f /home/coder/.ddev/traefik/custom-global-config/coder-routes-${DDEV_SITENAME}.yaml
